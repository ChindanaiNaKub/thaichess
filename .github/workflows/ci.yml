name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  anti-slop:
    name: Anti Slop Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run anti-slop check
        uses: peakoss/anti-slop@v0.2.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Unit And Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit and integration tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client and server
        run: npm run build

      - name: Smoke test built server startup
        run: npm run smoke:start --workspace=server

      - name: Package release bundle
        if: github.event_name == 'push'
        run: |
          tar -czf thaichess-release.tgz \
            package.json \
            package-lock.json \
            .node-version \
            client/package.json \
            server/package.json \
            client/dist \
            server/dist

      - name: Upload release bundle
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: thaichess-release
          path: thaichess-release.tgz
          if-no-files-found: error

  e2e:
    name: End To End Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: client

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            client/playwright-report
            client/test-results
          if-no-files-found: ignore

  deploy:
    name: Deploy To DigitalOcean
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - test
      - build
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: thaichess-release

      - name: Copy release bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: thaichess-release.tgz
          target: /tmp/
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_PATH: /var/www/thaichess
          DEPLOY_SERVICE: thaichess
          RELEASE_BUNDLE: /tmp/thaichess-release.tgz
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          envs: DEPLOY_PATH,DEPLOY_SERVICE,RELEASE_BUNDLE
          script_stop: true
          script: |
            set -eu

            cd "$DEPLOY_PATH"
            git fetch origin
            git switch main
            git pull --ff-only origin main
            tar -xzf "$RELEASE_BUNDLE" -C "$DEPLOY_PATH"

            lock_hash="$(sha256sum package-lock.json | cut -d' ' -f1)"
            stored_hash_file=".deploy-runtime-lock-hash"
            stored_hash=""
            if [ -f "$stored_hash_file" ]; then
              stored_hash="$(cat "$stored_hash_file")"
            fi

            if [ ! -d node_modules ] || [ "$lock_hash" != "$stored_hash" ]; then
              npm ci --omit=dev --workspace=server
              printf '%s' "$lock_hash" > "$stored_hash_file"
            fi

            sudo systemctl restart "$DEPLOY_SERVICE"

            echo "Waiting for health check to report ready..."
            attempt=0
            until [ "$attempt" -ge 30 ]; do
              status_code="$(curl -sS -o /tmp/thaichess-health.json -w '%{http_code}' http://127.0.0.1:3000/api/health || true)"

              if [ "$status_code" = "200" ] && grep -q '"status":"ok"' /tmp/thaichess-health.json; then
                cat /tmp/thaichess-health.json
                exit 0
              fi

              attempt=$((attempt + 1))
              sleep 5
            done

            echo "Deploy finished, but the app never became healthy."
            if [ -f /tmp/thaichess-health.json ]; then
              cat /tmp/thaichess-health.json
            fi
            sudo systemctl status "$DEPLOY_SERVICE" --no-pager -l || true
            exit 1
